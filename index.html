<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPACEHUB | Research Archive</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #0070f3; --text: #eaeaea; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { border-left: 4px solid var(--accent); padding-left: 20px; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 25px; border-radius: 8px; text-decoration: none; color: #eee; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .id { color: var(--accent); font-family: monospace; font-size: 0.8rem; }
        .title { font-size: 1.2rem; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>SPACEHUB Archive</h1><p>AEROSPACE & SYSTEMS ENGINEERING</p></header>
        <div class="grid" id="engine"></div>
    </div>
    <script>
        const database = [
            { id: "SYS-01", title: "Orbital Trajectory Optimization", link: "orbital.html" },
            { id: "SIG-02", title: "Interstellar Signal Recovery", link: "signal.html" },
            { id: "ROB-03", title: "Autonomous Debris Mitigation", link: "debris.html" }
        ];
        const engine = document.getElementById('engine');
        database.forEach(p => {
            engine.innerHTML += `<a href="${p.link}" class="card"><div class="id">${p.id}</div><div class="title">${p.title}</div><div>Access Data →</div></a>`;
        });
    </script>
</body>
</html>
